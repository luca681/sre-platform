filebeat.inputs:

  - type: log
    enabled: true
    paths:
      - /var/log/syslog
    fields:
      log_type: syslog
    fields_under_root: true

  - type: log
    enabled: true
    paths:
      - /var/log/apache2/error.log
    fields:
      log_type: apache_error
    fields_under_root: true

output.logstash:
  hosts: ["localhost:5044"]
