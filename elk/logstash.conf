input {
  beats {
    port => 5044
  }
  tcp {
    port => 5000
    codec => json
  }
}

filter {
  if [log_type] == "apache_error" {
    grok {
      match => {
        "message" => "\[%{DAY:day} %{MONTH:month} %{MONTHDAY:monthday} %{TIME:time} %{YEAR:year}\] \[%{DATA:module}:%{WORD:severity}\] \[pid %{NUMBER:pid}:tid %{NUMBER:tid}\] %{GREEDYDATA:error_message}"
      }
      tag_on_failure => ["grok_parse_failed"]
    }
    mutate {
      convert => { "pid" => "integer" }
      convert => { "tid" => "integer" }
    }
    if [severity] == "error" or [severity] == "crit" {
      mutate { add_tag => ["apache_critical"] }
    }
  }

  if [log_type] == "syslog" {
    grok {
      match => {
        "message" => "%{TIMESTAMP_ISO8601:syslog_timestamp} %{HOSTNAME:hostname} %{WORD:program}(?:\[%{POSINT:pid}\])?: %{GREEDYDATA:syslog_message}"
      }
      tag_on_failure => ["grok_parse_failed"]
    }
    if [syslog_message] =~ /error|Error|ERROR|failed|Failed/ {
      mutate { add_tag => ["syslog_error"] }
    }
  }
}

output {
  elasticsearch {
    hosts => ["http://elasticsearch:9200"]
    index => "%{log_type}-%{+yyyy.MM.dd}"
  }
}
